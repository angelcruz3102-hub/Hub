<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace Personal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #121212; color: #fff; }
        
        /* Contenedor del visor */
        #viewer-container { flex: 1; width: 100%; position: relative; background: #1e1e1e; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; display: block; }
        
        /* Estado cuando no hay app cargada */
        #placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #888; font-size: 16px; }
        
        /* Barra de herramientas superior rápida */
        #top-bar { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 8px 16px; border-bottom: 1px solid #333; font-size: 14px; }
        #external-link { color: #007bff; text-decoration: none; font-weight: bold; padding: 6px 12px; background: #222; border-radius: 4px; display: none; }

        /* Barra de navegación inferior táctil */
        #bottom-nav { display: flex; background: #161616; padding: 12px; gap: 10px; overflow-x: auto; border-top: 1px solid #2d2d2d; }
        #bottom-nav::-webkit-scrollbar { display: none; }
        
        .nav-btn { flex: 1; min-width: 110px; padding: 14px; background: #262626; color: #aaa; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
        .nav-btn.active { background: #007bff; color: #fff; }
    </style>
</head>
<body>

    <div id="top-bar">
        <span id="app-title">Selecciona una aplicación</span>
        <a id="external-link" target="_blank" href="#">Abrir pantalla completa ↗</a>
    </div>

    <div id="viewer-container">
        <div id="placeholder">Toca una aplicación abajo para iniciar</div>
        <iframe id="app-frame" style="display: none;"></iframe>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn" onclick="openApp('https://TU-USUARIO.github.io/mi-casa/', 'Control Casa', this)">🏠 Casa</button>
        <button class="nav-btn" onclick="openApp('https://TU-USUARIO.github.io/apuntes-ia/', 'Apuntes IA', this)">🎙️ Apuntes</button>
        <button class="nav-btn" onclick="openApp('https://TU-USUARIO.github.io/universidad/', 'Pensum Uni', this)">🎓 Universidad</button>
        <button class="nav-btn" onclick="openApp('https://TU-USUARIO.github.io/horario/', 'Mi Horario', this)">📅 Horario</button>
    </nav>

    <script>
        function openApp(url, title, btn) {
            // Ocultar placeholder y mostrar iframe
            document.getElementById('placeholder').style.display = 'none';
            const frame = document.getElementById('app-frame');
            frame.style.display = 'block';
            frame.src = url;

            // Actualizar barra superior
            document.getElementById('app-title').innerText = title;
            const extLink = document.getElementById('external-link');
            extLink.href = url;
            extLink.style.display = 'block';

            // Cambiar estado del botón activo
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
